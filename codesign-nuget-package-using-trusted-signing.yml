# Repo: FirelyTeam/azure-pipeline-templates
# File: codesign-nuget-package-using-trusted-signing.yml

# README:
# - Ensure Azure CLI and .NET SDK are available on the build agent
# - Create an Azure service connection with OIDC/Federated Credentials
# - Configure Azure Trusted Signing account and certificate profile
# - Assign 'Trusted Signing Certificate Profile Signer' role to your service principal
#
# See for more information on Trusted Signing:
#    https://learn.microsoft.com/en-us/azure/trusted-signing/how-to-signing-integrations


parameters:
- name: azureServiceConnection
  type: string
  displayName: 'Azure service connection for authentication'
  default: ''
- name: trustedSigningAccountEndpoint
  type: string
  displayName: 'Azure Trusted Signing account endpoint URL (e.g., https://eus.codesigning.azure.net)'
  default: ''
- name: trustedSigningAccountName
  type: string
  displayName: 'Trusted Signing account name'
  default: ''
- name: certificateProfileName
  type: string
  displayName: 'Certificate profile name in Trusted Signing'
  default: ''
- name: packagePaths
  type: string
  displayName: 'The path to the NuGet packages to sign. Wildcards can be used, like **/*.nupkg'
  default: ''
  
steps:
- ${{ if parameters.trustedSigningAccountEndpoint }}: # Only sign if Trusted Signing endpoint is provided
  - task: UseDotNet@2
    displayName: 'Install .NET 8 runtime for signing'
    inputs:
      packageType: runtime
      version: 8.x
      includePreviewVersions: false
  - task: AzureCLI@2
    displayName: 'Sign NuGet packages with Trusted Signing'
    inputs:
      azureSubscription: ${{ parameters.azureServiceConnection }}
      scriptType: 'pscore'
      scriptLocation: 'inlineScript'
      inlineScript: |
        # Install dotnet sign tool
        Write-Host "Installing dotnet sign tool..."
        dotnet tool install --global sign --version 0.9.1-beta.25379.1
        
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Failed to install dotnet sign tool"
          exit 1
        }
        
        # Resolve the base directory and glob pattern from the package path
        # Split at the first wildcard segment so that paths like **/*.nupkg work correctly
        $packagePath = "${{ parameters.packagePaths }}"
        $parts = $packagePath -split '[\\/]'
        $baseParts = @()
        $globParts = @()
        $foundWildcard = $false
        foreach ($part in $parts) {
          if (-not $foundWildcard -and $part -notmatch '\*|\?') {
            $baseParts += $part
          } else {
            $foundWildcard = $true
            $globParts += $part
          }
        }
        $baseDir = if ($baseParts.Count -gt 0) { $baseParts -join '/' } else { '.' }
        $globPattern = $globParts -join '/'

        # Verify packages exist
        $packages = Get-ChildItem -Path $packagePath -File
        if ($packages.Count -eq 0) {
          Write-Error "No NuGet packages found at path: $packagePath"
          exit 1
        }

        Write-Host "Found $($packages.Count) package(s) to sign:"
        $packages | ForEach-Object { Write-Host "  $($_.FullName)" }

        # Sign all packages in a single invocation
        $signArgs = @(
          'code',
          'trusted-signing',
          $globPattern,
          '--base-directory', $baseDir,
          '--trusted-signing-account', "${{ parameters.trustedSigningAccountName }}",
          '--trusted-signing-certificate-profile', "${{ parameters.certificateProfileName }}",
          '--trusted-signing-endpoint', "${{ parameters.trustedSigningAccountEndpoint }}",
          '--azure-credential-type', 'azure-cli',
          '--recurse-containers', 'false'
        )

        & sign @signArgs

        if ($LASTEXITCODE -ne 0) {
          Write-Error "Failed to sign packages"
          exit 1
        }

        Write-Host "`nAll packages signed successfully!"
      addSpnToEnvironment: true
  - task: PowerShell@2
    displayName: 'Extract certificate from nuget package'
    inputs:
      targetType: 'inline'
      script: |
        # Install Certificate Extractor tool
        Write-Host "Installing Knapcode.CertificateExtractor tool..."
        dotnet tool install --global Knapcode.CertificateExtractor --version 0.1.1
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Failed to install Knapcode.CertificateExtractor tool"
          exit 1
        }
        # Extract certificate from the first package (certificate is the same across all packages)
        $package = Get-ChildItem -Path "${{ parameters.packagePaths }}" -File | Select-Object -First 1

        if (-not $package) {
          Write-Error "No NuGet packages found at path: ${{ parameters.packagePaths }}"
          exit 1
        }

        Write-Host "Extracting certificate from package: $($package.Name)"
        nuget-cert-extractor --file $package.FullName --output "$(Build.ArtifactStagingDirectory)/certificates" --code-signing --author --leaf

        if ($LASTEXITCODE -ne 0) {
          Write-Error "Failed to extract certificate from package: $($package.Name)"
          exit 1
        }

        Write-Host "Successfully extracted certificate from: $($package.Name)"
  - task: PublishBuildArtifacts@1
    displayName: 'Publish Certificate Artifact'
    inputs:
      pathtoPublish: '$(Build.artifactStagingDirectory)/certificates'
      artifactName: Certificates

        
- ${{ else }}:
  - powershell: |
      Write-Host "No Trusted Signing endpoint provided, skipping signing of packages"
    displayName: 'No Trusted Signing endpoint provided'