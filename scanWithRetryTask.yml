parameters:
- name : trivyCacheAzureSubscription
  type: string
  default: ''
  displayName: 'Subscription used to retrieve Trivy cache. If left empty, no cache will be used.'
- name : trivyCacheStorageAccount
  type: string
  default: ''
  displayName: 'Storage account name where the Trivy cache is stored'
- name : trivyCacheContainerName
  type: string
  default: 'trivy-cache'
  displayName: 'Container name where the Trivy cache is stored'
- name : trivyCacheBlobName
  type: string
  default: 'trivy-cache.zip'
  displayName: 'Name of the Zip file containing the Trivy cache'
- name: localTrivyCachePath
  type: string
  default: $(Agent.TempDirectory)/trivy-cache
  displayName: 'Folder path containing the Trivy cache'
- name : dockerExtraArguments
  type: string
  default: ''
  displayName: 'Arguments for the docker command'
- name : trivyExtraArguments
  type: string
  default: ''
  displayName: 'Arguments for the trivy command'
- name: trivyIgnoreFile
  type: string
  default: ''
  displayName: 'Path to the trivy ignore file'
- name: displayName
  type: string
  default: 'Execute scan with retries'
  displayName: 'The display name of the task'
- name: dockerhubRegistryConnection
  type: string
  default: ''
  displayName: 'The Docker Hub registry connection (for authenticated pulls to avoid rate limits)'
- name: continueOnError
  type: boolean
  default: false
  displayName: 'Whether to continue the pipeline when vulnerabilities are found'
- name: vulnFoundVariableName
  type: string
  default: ''
  displayName: 'Pipeline variable name to set to "true" when vulnerabilities are found (used with continueOnError)'
- name: summaryVariableName
  type: string
  default: ''
  displayName: 'Pipeline variable name to set to a "N critical, N high, ..." string when vulnerabilities are found'
- name: cveListVariableName
  type: string
  default: ''
  displayName: 'Pipeline variable name to set to a semicolon-separated "CVE-ID|Library|Version|Severity" list when vulnerabilities are found'

steps:
- ${{ if ne(parameters.dockerhubRegistryConnection, '') }}:
  - task: Docker@2
    displayName: 'Docker Hub login (for pull rate limits)'
    inputs:
      containerRegistry: ${{ parameters.dockerhubRegistryConnection }}
      command: "login"
- ${{ if ne(parameters.trivyCacheAzureSubscription, '') }}:
  - task: AzureCLI@2
    displayName: 'Retrieve Trivy cache'
    inputs:
      azureSubscription: ${{ parameters.trivyCacheAzureSubscription }}
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        echo "Checking provided parameters..."
        if [ -z "${{ parameters.trivyCacheStorageAccount }}" ]; then
          echo "Trivy cache storage account name is not provided."
          exit 1
        fi
        if [ -z "${{ parameters.trivyCacheContainerName }}" ]; then
          echo "Trivy cache container name is not provided."
          exit 1
        fi
        if [ -z "${{ parameters.trivyCacheBlobName }}" ]; then
          echo "Trivy cache blob name is not provided."
          exit 1
        fi
        if [ -z "${{ parameters.localTrivyCachePath }}" ]; then
          echo "Local Trivy DB path is not provided."
          exit 1
        fi
        echo "Retrieving blob storage..."
        az storage blob download \
          --account-name ${{ parameters.trivyCacheStorageAccount }} \
          --container-name ${{ parameters.trivyCacheContainerName }} \
          --name ${{ parameters.trivyCacheBlobName }} \
          --file $(Agent.TempDirectory)/${{ parameters.trivyCacheBlobName }} \
          --auth-mode login

        echo "Create folder ${{ parameters.localTrivyCachePath }}.."
        mkdir -p ${{ parameters.localTrivyCachePath }}
        echo "Unzipping blob..."
        unzip -o $(Agent.TempDirectory)/${{ parameters.trivyCacheBlobName }} -d ${{ parameters.localTrivyCachePath }}
        echo "Blob retrieved and unzipped successfully."


- script: |
    retries=10
    count=0
    if [ -z "${{ parameters.localTrivyCachePath }}" ]; then
          echo "Local Trivy DB path is not provided."
          exit 1
        fi
    if [ -n "${{ parameters.trivyIgnoreFile }}" ]; then
      ignoreMountArgs="-v ${{ parameters.trivyIgnoreFile }}:/tmp/trivyignore"
      ignoreFileTrivyArgs="--ignorefile /tmp/trivyignore"
      echo "Using ignore file at ${{ parameters.trivyIgnoreFile }}"
    else 
      ignoreMountArgs=""
      ignoreFileTrivyArgs=""
      echo "No ignore file specified."
    fi
    echo "Using local cache at ${{ parameters.localTrivyCachePath }}: "
    ls -al ${{ parameters.localTrivyCachePath }}
    localCacheMountArgs="-v ${{ parameters.localTrivyCachePath }}:/mnt/trivy/cache"
    localCacheTrivyArgs="--cache-dir /mnt/trivy/cache"
    # If the cache folder is not empty, use the offline mode
    if [ -z "$( ls -A '${{ parameters.localTrivyCachePath }}' )" ]; then
      echo "Local cache is empty."
      offlineTrivyArgs=""
    else
      echo "Local cache is not empty, running in offline mode."
      offlineTrivyArgs="--skip-db-update --skip-java-db-update --offline-scan --skip-check-update"
    fi
    
    command="docker run --rm -v /var/run/docker.sock:/var/run/docker.sock $ignoreMountArgs $localCacheMountArgs ${{ parameters.dockerExtraArguments }} aquasec/trivy:0.69.3 $ignoreFileTrivyArgs $localCacheTrivyArgs $offlineTrivyArgs --exit-code 1 --format table --scanners vuln,misconfig,secret ${{ parameters.trivyExtraArguments }}"
    
    echo "Executing '$command' with retries..."
    while [ $count -lt $retries ]; do
      log_output=$($command 2>&1)
      exit_code=$?
      echo "$log_output"
      if echo "$log_output" | grep "Fatal" | grep "failed to download artifact" | grep -q "failed to download vulnerability DB"; then
        count=$((count + 1))
        echo "Scan failed due to DB download error. Attempt $count/$retries. Retrying in 10 seconds..."
        sleep 10
      else
        if [ $exit_code -eq 0 ]; then
          echo "Scan completed successfully."
          break
        else
          echo "Scan failed due to other errors."
          VULN_VAR_NAME="${{ parameters.vulnFoundVariableName }}"
          if [ -n "$VULN_VAR_NAME" ]; then
            echo "##vso[task.setvariable variable=$VULN_VAR_NAME]true"
          fi
          SUMMARY_VAR_NAME="${{ parameters.summaryVariableName }}"
          if [ -n "$SUMMARY_VAR_NAME" ]; then
            TRIVY_SUMMARY=$(echo "$log_output" | python3 -c "
    import re, sys
    counts = {}
    for line in sys.stdin:
        m = re.search(r'Total:\s*\d+\s*\(([^)]+)\)', line)
        if m:
            for item in m.group(1).split(','):
                kv = item.strip().split(':')
                if len(kv) == 2:
                    sev = kv[0].strip().lower()
                    try:
                        cnt = int(kv[1].strip())
                        if sev in ('critical','high','medium','low') and cnt > 0:
                            counts[sev] = counts.get(sev, 0) + cnt
                    except: pass
    order = ['critical','high','medium','low']
    result = [str(counts[s]) + ' ' + s for s in order if counts.get(s, 0) > 0]
    print(', '.join(result))
    ")
            echo "##vso[task.setvariable variable=$SUMMARY_VAR_NAME]$TRIVY_SUMMARY"
          fi
          CVE_LIST_VAR_NAME="${{ parameters.cveListVariableName }}"
          if [ -n "$CVE_LIST_VAR_NAME" ]; then
            TRIVY_CVES=$(echo "$log_output" | python3 -c "
    import re, sys
    results = []
    seen = set()
    for line in sys.stdin:
        if chr(9474) not in line:
            continue
        parts = [p.strip() for p in line.split(chr(9474))]
        if len(parts) < 6:
            continue
        lib, cve, sev, ver = parts[1], parts[2], parts[3], parts[5]
        if re.match(r'CVE-', cve) and re.match(r'CRITICAL|HIGH|MEDIUM|LOW', sev) and lib and cve not in seen:
            seen.add(cve)
            results.append(cve + '|' + lib + '|' + ver + '|' + sev)
    print(';'.join(results))
    ")
            echo "##vso[task.setvariable variable=$CVE_LIST_VAR_NAME]$TRIVY_CVES"
          fi
          exit 1
        fi
      fi
    done
    if [ $count -eq $retries ]; then
      echo "Scan failed after $retries attempts due to DB download error."
      VULN_VAR_NAME="${{ parameters.vulnFoundVariableName }}"
      if [ -n "$VULN_VAR_NAME" ]; then
        echo "##vso[task.setvariable variable=$VULN_VAR_NAME]true"
      fi
      SUMMARY_VAR_NAME="${{ parameters.summaryVariableName }}"
      if [ -n "$SUMMARY_VAR_NAME" ]; then
        TRIVY_SUMMARY=$(echo "$log_output" | python3 -c "
    import re, sys
    counts = {}
    for line in sys.stdin:
        m = re.search(r'Total:\s*\d+\s*\(([^)]+)\)', line)
        if m:
            for item in m.group(1).split(','):
                kv = item.strip().split(':')
                if len(kv) == 2:
                    sev = kv[0].strip().lower()
                    try:
                        cnt = int(kv[1].strip())
                        if sev in ('critical','high','medium','low') and cnt > 0:
                            counts[sev] = counts.get(sev, 0) + cnt
                    except: pass
    order = ['critical','high','medium','low']
    result = [str(counts[s]) + ' ' + s for s in order if counts.get(s, 0) > 0]
    print(', '.join(result))
    ")
        echo "##vso[task.setvariable variable=$SUMMARY_VAR_NAME]$TRIVY_SUMMARY"
      fi
      CVE_LIST_VAR_NAME="${{ parameters.cveListVariableName }}"
      if [ -n "$CVE_LIST_VAR_NAME" ]; then
        TRIVY_CVES=$(echo "$log_output" | python3 -c "
    import re, sys
    results = []
    seen = set()
    for line in sys.stdin:
        if chr(9474) not in line:
            continue
        parts = [p.strip() for p in line.split(chr(9474))]
        if len(parts) < 6:
            continue
        lib, cve, sev, ver = parts[1], parts[2], parts[3], parts[5]
        if re.match(r'CVE-', cve) and re.match(r'CRITICAL|HIGH|MEDIUM|LOW', sev) and lib and cve not in seen:
            seen.add(cve)
            results.append(cve + '|' + lib + '|' + ver + '|' + sev)
    print(';'.join(results))
    ")
        echo "##vso[task.setvariable variable=$CVE_LIST_VAR_NAME]$TRIVY_CVES"
      fi
      exit 1
    fi
  displayName: ${{ parameters.displayName }}
  continueOnError: ${{ parameters.continueOnError }}