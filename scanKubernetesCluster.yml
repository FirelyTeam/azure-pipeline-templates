parameters:
  - name: kubernetesServiceEndpoint
    type: string
    displayName: 'Kubernetes service connection endpoint'
  - name: outputFormat
    type: string
    default: 'html'
    displayName: 'Output format for Kubescape scan'
    values:
      - html
      - json
  - name: outputFile
    type: string
    default: 'results.html'
    displayName: 'Output file for Kubescape scan'
  - name: artifactName
    type: string
    default: 'kubescape-results'
    displayName: 'Name of the artifact to publish'
  - name: exceptionsFile
    type: string
    default: ''
    displayName: 'Path to a Kubescape exceptions JSON file (optional)'

jobs:
- job: scan
  displayName: Scan Kubernetes Cluster
  pool:
    vmImage: 'ubuntu-latest'
  steps:
  - ${{ if ne(parameters.exceptionsFile, '') }}:
    - checkout: self
  - ${{ else }}:
    - checkout: none

  - script: |
      echo "Validating that we are running on a system with apt..."
      if [ "$(uname -s)" != "Linux" ] || ! command -v apt >/dev/null 2>&1; then
        echo "This pipeline must run on a Linux agent with apt package manager."
        exit 1
      fi
      echo "Validation passed: apt is available."
    displayName: 'Validate apt-based Linux Distro'

  - task: Kubernetes@1
    displayName: "Login Cluster"
    inputs:
      connectionType: "Kubernetes Service Connection"
      kubernetesServiceEndpoint: ${{ parameters.kubernetesServiceEndpoint }}
      command: login

  - script: |
      echo "Adding Kubescape APT repository..."
      if ! sudo add-apt-repository -y ppa:kubescape/kubescape; then
        echo "Failed to add Kubescape APT repository." >&2
        exit 1
      fi
      sudo apt update
      sudo apt install -y kubescape
      echo "Kubescape version:"
      kubescape version
    displayName: 'Install Kubescape using apt'

  - script: |
      set -euo pipefail
      EXCEPTIONS_FILE="${{ parameters.exceptionsFile }}"
      SCAN_ARGS=(scan --format "${{ parameters.outputFormat }}" --output "${{ parameters.outputFile }}")
      if [ -n "$EXCEPTIONS_FILE" ]; then
        if [ ! -f "$EXCEPTIONS_FILE" ]; then
          echo "Exceptions file not found: $EXCEPTIONS_FILE" >&2
          exit 1
        fi
        SCAN_ARGS+=(--exceptions "$EXCEPTIONS_FILE")
      fi
      echo "Running Kubescape ${SCAN_ARGS[*]}"
      kubescape "${SCAN_ARGS[@]}"
    displayName: 'Run Kubescape scan'

  - publish: ${{ parameters.outputFile }}
    artifact: ${{ parameters.artifactName }}
    displayName: 'Publish Kubescape scan results'

  - task: Kubernetes@1
    displayName: "Logout Cluster"
    condition: always()
    inputs:
      connectionType: "Kubernetes Service Connection"
      kubernetesServiceEndpoint: ${{ parameters.kubernetesServiceEndpoint }}
      command: logout